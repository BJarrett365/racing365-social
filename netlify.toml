[build]
  # Use `next build` here — not `npm run build` — because package.json pins
  # NEXT_DIST_DIR=.next-prod locally; Netlify must emit `.next` for the adapter.
  command = "npm run install-ffmpeg-static && npx next build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  PUPPETEER_SKIP_DOWNLOAD = "true"
  NODE_OPTIONS = "--max-old-space-size=8192"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # Keep heavy native binaries out of every function bundle (especially ___netlify-server-handler).
  external_node_modules = ["ffmpeg-static", "puppeteer", "@sparticuz/chromium"]

[functions."___netlify-server-handler"]
  external_node_modules = ["ffmpeg-static", "puppeteer", "@sparticuz/chromium"]

[functions."build-short-background"]
  external_node_modules = ["ffmpeg-static"]
  included_files = ["node_modules/ffmpeg-static/ffmpeg"]
  timeout = 900

[functions."language-rewrite-background"]
  timeout = 900

[functions."match-report-build-background"]
  timeout = 900

[functions."match-report-generate-media-background"]
  timeout = 900

[functions."match-report-player-intelligence-background"]
  timeout = 900

# Long video builds use netlify/functions/build-short-background.mts (15 minute background limit).
# Do not use pages/api experimental-background routes — @netlify/plugin-nextjs v5 rejects them.
